name: OPA

on:
  workflow_call:

jobs:

  opa:

    runs-on: self-hosted

    container:
      image: openpolicyagent/opa:latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Evaluate Policy
        run: |
          opa eval \
          -d policies \
          -i tfplan.json \
          "data.azure.naming"